# breadboard.yaml — reference layout for the MIDI Logger.
#
# WARNING: This layout is NOT buildable as written and intentionally fails
# breadboard_validator.py.  The root cause is that the ESP32-S3's 3V3 pins
# are on the left header (A1, A2) where tap_method='none' — they cannot be
# tapped from the breadboard — so the (+) rail has no source.
#
# RECOMMENDED ASSEMBLY: use point-to-point (P2P) mode instead:
#   python3 p2p_layout.py netlist.yaml pointtopoint.yaml
#   python3 assembly_generator.py --mode p2p pointtopoint.yaml assembly.md
#
# P2P is viable for this circuit because the SD card is the only external
# component: esp32.3V3.1 wires directly to sdcard.VCC and esp32.GND.1 to
# sdcard.GND, bypassing the breadboard rail limitation entirely.

circuit: MIDI Logger — ESP32-S3 USB host + Micro SD Card
breadboard:
  type: full-size
  rows: 63
  columns:
  - A
  - B
  - C
  - D
  - E
  - F
  - G
  - H
  - I
  - J
components:
- id: esp32
  type: board-esp32-s3-devkitc-1
  body:
    top-row: 1
    bottom-row: 26
    left-col: A
    right-col: I
  pins:
    3V3.1: A1
    3V3.2: A2
    RST: A3
    '4': A4
    '5': A5
    '6': A6
    '7': A7
    '15': A8
    '16': A9
    '17': A10
    '18': A11
    '8': A12
    '3': A13
    '46': A14
    '9': A15
    '10': A16
    '11': A17
    '12': A18
    '13': A19
    '14': A20
    5V: A21
    GND.1: A22
    GND.2: I1
    TX: I2
    RX: I3
    '1': I4
    '2': I5
    '42': I6
    '41': I7
    '40': I8
    '39': I9
    '38': I10
    '37': I11
    '36': I12
    '35': I13
    '0': I14
    '45': I15
    '48': I16
    '47': I17
    '21': I18
    '20': I19
    '19': I20
    GND.3: I21
    GND.4: I22
external_components:
- id: sdcard
  type: microsd-spi-module
  reason: External component (see parts_library.yaml)
  connections:
    VCC: rail-plus
    GND: rail-minus
wires:
# NOTE: 3V3 is only available on left-header pins (A1, A2). These cannot be
# tapped from the breadboard (no adjacent hole; body covers B–E in rows 1–22)
# and parts_library.yaml header_info.left.tap_method="none" rules out female
# jumpers. For circuits requiring a 3V3 breadboard rail, use P2P mode instead
# (python3 p2p_layout.py netlist.yaml pointtopoint.yaml).
# GND is available via right-header GND.2 at I1, tapped at J1.
- from: J1                 # I1 = esp32.GND.2 (right header); J1 is free (outside body)
  to: rail-minus
  color: black
  purpose: GND
- from: ext:sdcard:VCC
  to: rail-plus
  color: gray
  purpose: SD_VCC
- from: ext:sdcard:GND
  to: rail-minus
  color: gray
  purpose: SD_GND
- from: J13
  to: ext:sdcard:MOSI
  color: gray
  purpose: SD_MOSI
- from: J11
  to: ext:sdcard:MISO
  color: gray
  purpose: SD_MISO
- from: J12
  to: ext:sdcard:SCK
  color: gray
  purpose: SD_SCK
- from: J10
  to: ext:sdcard:CS
  color: gray
  purpose: SD_CS
