; MIDI Logger — ESP32-S3 + SD Card
; Records every note played on a Yamaha P-125 (USB MIDI) to a microSD card.
;
; WOKWI SIMULATION (default):
;   -DWOKWI_SIMULATION=1  generates a synthetic C-major arpeggio every 1.2 s.
;   The SD card is virtualised by Wokwi (wokwi-microsd-card component).
;
; REAL HARDWARE — to flash for use with the actual keyboard:
;   1. Remove -DWOKWI_SIMULATION=1 from build_flags.
;   2. Add   -DARDUINO_USB_MODE=0  (enables native USB OTG mode).
;   3. Connect: Yamaha P-125 USB-B → USB-B/A cable → Mepsies OTG adapter → ESP32-S3 USB port.
;   4. The COM port (separate USB-C on DevKitC-1) remains available for serial monitoring.
;   Note: full USB MIDI host driver is stubbed — see src/main.cpp for implementation notes.

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DWOKWI_SIMULATION=1
; SD library is bundled with the ESP32 Arduino core — no external lib_deps needed
