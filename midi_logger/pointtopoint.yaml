# pointtopoint.yaml — generated by p2p_layout.py
# Generate assembly instructions with:
#   python3 assembly_generator.py --mode p2p pointtopoint.yaml assembly.md

assembly_mode: point-to-point
circuit: MIDI Logger — ESP32-S3 USB host + Micro SD Card
note: 'P2P assembly: no breadboard required. ESP32 sits on a non-conductive surface
  or is held by the USB cable. Connect each wire as listed. For junction nodes (a
  net with 3+ endpoints), twist the wire ends together or use a small solder blob.'
wires:
- from: esp32.3V3 (left header, pin 1 — top-left)
  to: sdcard.VCC
  from_note: 'female end onto ESP32 header pin: 3V3 (left header, pin 1 — top-left)'
  to_note: sdcard external — connect to VCC header pin
  color: red
  net: VCC_3V3
  purpose: 3.3 V directly from ESP32 left-header pin 3V3.1 to SD card VCC (P2P; no
    rail)
- from: esp32.GND (left header, pin 22 — bottom-left)
  to: sdcard.GND
  from_note: 'female end onto ESP32 header pin: GND (left header, pin 22 — bottom-left)'
  to_note: sdcard external — connect to GND header pin
  color: black
  net: GND
  purpose: Ground directly from ESP32 left-header pin GND.1 to SD card GND (P2P; no
    rail)
- from: esp32.GPIO35 (right header, pin 13)
  to: sdcard.MOSI
  from_note: 'female end onto ESP32 header pin: GPIO35 (right header, pin 13)'
  to_note: sdcard external — connect to MOSI header pin
  color: yellow
  net: SD_MOSI
  purpose: SPI data host→card (GPIO35, right header I13, tap J13)
- from: esp32.GPIO37 (right header, pin 11)
  to: sdcard.MISO
  from_note: 'female end onto ESP32 header pin: GPIO37 (right header, pin 11)'
  to_note: sdcard external — connect to MISO header pin
  color: blue
  net: SD_MISO
  purpose: SPI data card→host (GPIO37, right header I11, tap J11)
- from: esp32.GPIO36 (right header, pin 12)
  to: sdcard.SCK
  from_note: 'female end onto ESP32 header pin: GPIO36 (right header, pin 12)'
  to_note: sdcard external — connect to SCK header pin
  color: green
  net: SD_SCK
  purpose: SPI clock (GPIO36, right header I12, tap J12)
- from: esp32.GPIO38 (right header, pin 10)
  to: sdcard.CS
  from_note: 'female end onto ESP32 header pin: GPIO38 (right header, pin 10)'
  to_note: sdcard external — connect to CS header pin
  color: orange
  net: SD_CS
  purpose: SPI chip-select (GPIO38, right header I10, tap J10)
