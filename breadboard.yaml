# breadboard.yaml — Physical layout for the ambient light sensor circuit.
# Validated by: python3 breadboard_validator.py breadboard.yaml
#
# Coordinate system
#   Columns A-E = left half of breadboard (isolated from F-J by centre gap)
#   Columns F-J = right half
#   Rows 1-63 top-to-bottom (full-size 830-point breadboard)
#   Power rails: "rail-plus" = (+) / 3.3V   "rail-minus" = (-) / GND
#
# Rule: each hole accepts exactly one component lead or one jumper wire pin.
# Wires that connect to a component node must use a DIFFERENT hole in the
# same row-half, not the hole occupied by the component pin itself.
#
# ESP32-S3 body: cols A-I, rows 1-26.  The ONLY accessible holes in this zone
# are the actual header pin holes (A1-A22, I1-I22).  All other holes in the
# body zone are physically blocked by the PCB.
#
#   Left-header GPIOs (col A): no accessible adjacent breadboard hole exists
#     → connect via "pin:" female wire directly onto the header pin above the PCB.
#   Right-header GPIOs (col I): use col J (same right-half row, outside body).
#
# Wire endpoint types:
#   "Xnn"          — standard breadboard hole (e.g. J4)
#   "rail-plus"    — (+) power rail
#   "rail-minus"   — (-) power rail
#   "ext:id:PIN"   — pin on an external component (wire goes off-board)
#   "pin:id.PIN"   — female jumper wire plugged directly onto a header pin above
#                    the PCB (used when no adjacent breadboard hole is accessible)

circuit: "Ambient light sensor — ESP32-S3 + LDR voltage divider + LCD1602"

breadboard:
  type: full-size
  rows: 63
  columns: [A, B, C, D, E, F, G, H, I, J]

components:

  # ── ESP32-S3 DevKitC-1 ──────────────────────────────────────────────────
  # Body: rows 1-26, cols A-I (col J is outside the body and accessible).
  # Left header: col A, rows 1-22.
  # Right header: col I, rows 1-22.
  # Right-header GPIOs are tapped via col J (same right-half row, free).
  - id: esp32
    type: board-esp32-s3-devkitc-1
    body:
      top-row: 1
      bottom-row: 26
      left-col: A
      right-col: I
    pins:
      # Left header — column A, rows 1-22
      3V3.1:  A1
      3V3.2:  A2
      RST:    A3
      "4":    A4
      "5":    A5
      "6":    A6
      "7":    A7
      "15":   A8
      "16":   A9
      "17":   A10
      "18":   A11
      "8":    A12
      "3":    A13
      "46":   A14
      "9":    A15
      "10":   A16
      "11":   A17
      "12":   A18
      "13":   A19
      "14":   A20
      5V:     A21
      GND.1:  A22
      # Right header — column I, rows 1-22
      GND.2:  I1
      TX:     I2
      RX:     I3
      "1":    I4    # GPIO1  → LDR junction (ADC input), tapped at J4
      "2":    I5    # GPIO2  → LCD RS,      tapped at J5
      "42":   I6    # GPIO42 → LCD Enable,  tapped at J6
      "41":   I7    # GPIO41 → LCD D4,      tapped at J7
      "40":   I8    # GPIO40 → LCD D5,      tapped at J8
      "39":   I9    # GPIO39 → LCD D6,      tapped at J9
      "38":   I10   # GPIO38 → LCD D7,      tapped at J10
      "37":   I11
      "36":   I12
      "35":   I13
      "0":    I14
      "45":   I15
      "48":   I16
      "47":   I17
      "21":   I18
      "20":   I19
      "19":   I20
      GND.3:  I21
      GND.4:  I22

  # ── Photoresistor (LDR) ─────────────────────────────────────────────────
  # Rows 28-29, column H (right half). Clear of ESP32 body (ends at row 26).
  # lead-1 = 3.3V end (H28)
  # lead-2 = junction with resistor (H29)
  - id: ldr
    type: photoresistor-ldr
    body:
      top-row: 28
      bottom-row: 29
      left-col: H
      right-col: H
    pins:
      lead-1: H28   # 3.3V end
      lead-2: H29   # junction (electrically shared with resistor-10k.lead-1 at G29)

  # ── 10K pull-down resistor ──────────────────────────────────────────────
  # Rows 29-31, column G (right half, adjacent to LDR column H).
  # lead-1 shares the junction node with ldr.lead-2 (same row 29, right half).
  - id: resistor-10k
    type: resistor
    body:
      top-row: 29
      bottom-row: 31
      left-col: G
      right-col: G
    pins:
      lead-1: G29   # junction (same row-half as H29 → electrically connected)
      lead-2: G31   # GND end

  # ── Potentiometer (10K, LCD contrast) ───────────────────────────────────
  # 2+1 pin arrangement rotated 90°:
  #   gnd-end and vcc-end in same column (C), different rows (not shorted).
  #   wiper 2 cols right (E), centred between terminals.
  # Pin positions verified by parts_library.yaml (potentiometer-10k offsets).
  - id: pot
    type: potentiometer-10k
    body:
      top-row: 33
      bottom-row: 35
      left-col: C
      right-col: E
    pins:
      gnd-end: C33   # top terminal
      vcc-end: C35   # bottom terminal (same col C, 2 rows below — different net)
      wiper:   E34   # wiper (2 cols right of C = col E, row between terminals)

# ── External components ──────────────────────────────────────────────────────
# Components connected via wires but NOT placed on the breadboard.
# WHY external?  The LCD1602A PCB is 80×36 mm — too large to sit on-board
# alongside the ESP32-S3 (parts_library.yaml marks it external_only: true).
external_components:
  - id: lcd
    type: lcd1602-16pin
    reason: "PCB (80×36 mm) too large to place on-board alongside ESP32-S3"
    connections:
      VSS:  rail-minus      # LCD GND
      VDD:  rail-plus       # LCD 3.3 V
      RW:   rail-minus      # write-only mode (tie to GND)
      A:    rail-plus       # backlight anode
      K:    rail-minus      # backlight cathode
      V0:   B34             # wiper node (E34 = wiper; B34 is free, left-half row 34)
      RS:   J5              # GPIO2 at I5, tapped via J5 (col J, outside body)
      E:    J6              # GPIO42 at I6, tapped via J6
      D4:   J7              # GPIO41 at I7, tapped via J7
      D5:   J8              # GPIO40 at I8, tapped via J8
      D6:   J9              # GPIO39 at I9, tapped via J9
      D7:   J10             # GPIO38 at I10, tapped via J10

wires:
  # ── Power rail setup ────────────────────────────────────────────────────
  # 3V3 pins are left-header only (A1, A2) and cannot be tapped from the
  # breadboard — no adjacent hole exists (B–E rows 1–22 blocked by PCB body),
  # and this board variant does not support female-jumper connections
  # (parts_library.yaml: header_info.left.tap_method = "none").
  # 3V3 power for external peripherals must come from a separate 3.3V supply,
  # or the circuit should use P2P mode (p2p_layout.py) instead.
  #
  # GND is available on the right header: I1 (GND.2), tapped via J1.

  - from: J1                 # row 1 right-half; I1 occupied by esp32.GND.2; J1 is free
    to:   rail-minus
    color: black
    purpose: ESP32 GND (right header row 1) → (-) power rail

  # ── LDR voltage divider ─────────────────────────────────────────────────
  # H28 = LDR 3V3 end; H29/G29 = junction node; G31 = resistor GND end.
  # Column F is free in these rows — use it for the rail/junction wires.

  - from: rail-plus
    to:   F28               # row 28 right-half; H28 occupied by ldr.lead-1
    color: red
    purpose: 3.3V → top of LDR

  - from: F31               # row 31 right-half; G31 occupied by resistor-10k.lead-2
    to:   rail-minus
    color: black
    purpose: Bottom of 10K resistor → GND

  - from: F29               # row 29 right-half; G29 and H29 occupied; F29 is free
    to:   J4                # row 4 right-half; I4 = GPIO1; J4 is free (outside body)
    color: yellow
    purpose: LDR junction → ESP32 GPIO1 (ADC input)

  # ── Potentiometer ────────────────────────────────────────────────────────
  # C33/C35 are terminal pins; E34 is the wiper.
  # B33 and B35 are free (col B, rows 33/35 — outside ESP32 body, outside pot body).
  # B34 is the wiper tap: left-half row 34, col B (outside pot body cols C-E).

  - from: B33               # row 33 left-half; C33 occupied by pot.gnd-end
    to:   rail-minus
    color: black
    purpose: Potentiometer GND terminal → (-) rail

  - from: B35               # row 35 left-half; C35 occupied by pot.vcc-end
    to:   rail-plus
    color: red
    purpose: Potentiometer VCC terminal → (+) rail

  - from: B34               # row 34 left-half; E34 = pot.wiper; B34 free (col B < pot body col C)
    to:   ext:lcd:V0
    color: green
    purpose: Potentiometer wiper → LCD contrast (V0, pin 3)

  # ── LCD power / mode wires (to external LCD) ─────────────────────────────

  - from: rail-minus
    to:   ext:lcd:VSS
    color: black
    purpose: LCD VSS (pin 1) → GND

  - from: rail-plus
    to:   ext:lcd:VDD
    color: red
    purpose: LCD VDD (pin 2) → 3.3V

  - from: rail-minus
    to:   ext:lcd:RW
    color: black
    purpose: LCD RW (pin 5) → GND (write-only mode)

  - from: rail-plus
    to:   ext:lcd:A
    color: red
    purpose: LCD backlight anode (pin 15) → 3.3V

  - from: rail-minus
    to:   ext:lcd:K
    color: black
    purpose: LCD backlight cathode (pin 16) → GND

  # ── GPIO → LCD control and data wires ────────────────────────────────────
  # Right-header GPIOs at col I → tap via col J (same right-half row, outside body).

  - from: J5                # row 5; I5 = GPIO2
    to:   ext:lcd:RS
    color: blue
    purpose: GPIO2 → LCD RS (pin 4, data/command select)

  - from: J6                # row 6; I6 = GPIO42
    to:   ext:lcd:E
    color: purple
    purpose: GPIO42 → LCD Enable (pin 6)

  - from: J7                # row 7; I7 = GPIO41
    to:   ext:lcd:D4
    color: orange
    purpose: GPIO41 → LCD D4 (pin 11)

  - from: J8                # row 8; I8 = GPIO40
    to:   ext:lcd:D5
    color: yellow
    purpose: GPIO40 → LCD D5 (pin 12)

  - from: J9                # row 9; I9 = GPIO39
    to:   ext:lcd:D6
    color: green
    purpose: GPIO39 → LCD D6 (pin 13)

  - from: J10               # row 10; I10 = GPIO38
    to:   ext:lcd:D7
    color: white
    purpose: GPIO38 → LCD D7 (pin 14)
