# breadboard.yaml — Physical layout for the ambient light sensor circuit.
# Validated by: python3 breadboard_validator.py breadboard.yaml
#
# Coordinate system
#   Columns A-E = left half of breadboard (isolated from F-J by centre gap)
#   Columns F-J = right half
#   Rows 1-63 top-to-bottom (full-size 830-point breadboard)
#   Power rails: "rail-plus" = (+) / 3.3V   "rail-minus" = (-) / GND
#
# Rule: each hole accepts exactly one component lead or one jumper wire pin.
# Wires that connect to a component node must use a DIFFERENT hole in the
# same row-half, not the hole occupied by the component pin itself.
#
# External wire endpoints:
#   "ext:lcd:PIN" — wire goes to the named pin on the external LCD module
#   (LCD sits beside the breadboard; see external_components section below)

breadboard:
  type: full-size
  rows: 63
  columns: [A, B, C, D, E, F, G, H, I, J]

components:

  # ── ESP32-S3 DevKitC-1 ──────────────────────────────────────────────────
  # Board body: rows 1-26, cols A-J (nothing else may go in this zone).
  - id: esp32
    type: board-esp32-s3-devkitc-1
    body:
      top-row: 1
      bottom-row: 26
      left-col: A
      right-col: J
    pins:
      # Left header — column A, rows 1-22
      3V3.1:  A1
      3V3.2:  A2
      RST:    A3
      "4":    A4    # GPIO4  → LCD RS
      "5":    A5    # GPIO5  → LCD Enable
      "6":    A6    # GPIO6  → LCD D4
      "7":    A7    # GPIO7  → LCD D5
      "15":   A8
      "16":   A9
      "17":   A10
      "18":   A11
      "8":    A12   # GPIO8  → LCD D6  (row 12, NOT row 8)
      "3":    A13
      "46":   A14
      "9":    A15   # GPIO9  → LCD D7  (row 15, NOT row 9)
      "10":   A16
      "11":   A17
      "12":   A18
      "13":   A19
      "14":   A20
      5V:     A21
      GND.1:  A22
      # Right header — column I, rows 1-22
      GND.2:  I1
      TX:     I2
      RX:     I3
      "1":    I4    # GPIO1  → LDR junction (ADC input)
      "2":    I5
      "42":   I6
      "41":   I7
      "40":   I8
      "39":   I9
      "38":   I10
      "37":   I11
      "36":   I12
      "35":   I13
      "0":    I14
      "45":   I15
      "48":   I16
      "47":   I17
      "21":   I18
      "20":   I19
      "19":   I20
      GND.3:  I21
      GND.4:  I22

  # ── Photoresistor (LDR) ─────────────────────────────────────────────────
  # Rows 28-29, column H (right half). Clear of ESP32 body (ends at row 26).
  # lead-1 = 3.3V end (H28)
  # lead-2 = junction with resistor (H29) — shared node, different holes
  - id: ldr
    type: photoresistor-ldr
    body:
      top-row: 28
      bottom-row: 29
      left-col: H
      right-col: H
    pins:
      lead-1: H28   # 3.3V end
      lead-2: H29   # junction (electrically shared with resistor-10k.lead-1 at G29)

  # ── 10K pull-down resistor ──────────────────────────────────────────────
  # Rows 29-31, column G (right half, adjacent to LDR column H).
  # lead-1 shares the junction node with ldr.lead-2 (same row 29, right half).
  - id: resistor-10k
    type: resistor
    body:
      top-row: 29
      bottom-row: 31
      left-col: G
      right-col: G
    pins:
      lead-1: G29   # junction (same row-half as H29 → electrically connected)
      lead-2: G31   # GND end

  # ── Potentiometer (10K, LCD contrast) ───────────────────────────────────
  # 2+1 pin arrangement: two terminal pins on one side, wiper on the other.
  # Rotate pot 90° for breadboard use:
  #   • gnd-end and vcc-end go in the SAME COLUMN (C), different rows.
  #     (Different rows = different breadboard nets — they are NOT shorted.)
  #   • wiper goes 2 columns to the right (E), centred between the terminals.
  # Pin positions verified by parts_library.yaml (potentiometer-10k offsets).
  - id: pot
    type: potentiometer-10k
    body:
      top-row: 33
      bottom-row: 35
      left-col: C
      right-col: E
    pins:
      gnd-end: C33   # top terminal
      vcc-end: C35   # bottom terminal (same col C, 2 rows below — different net)
      wiper:   E34   # wiper (2 cols right of C = col E, row between terminals)

# ── External components ──────────────────────────────────────────────────────
# Components that connect to the circuit via wires but are NOT placed on the
# breadboard.  Their bodies do not occupy any breadboard holes.
#
# WHY external?  The LCD1602A PCB is 80×36 mm.  With pins in a single
# breadboard column it would cover ≈31 rows × 14 columns of board surface.
# Given the ESP32-S3 body at rows 1-26 there is no position on a 63-row
# breadboard where the LCD can sit without either overlapping the pot / LDR
# region or running off the bottom.  Connect it via individual jumper wires.
external_components:
  - id: lcd
    type: lcd1602-16pin
    reason: "PCB (80×36 mm) too large to place on-board alongside ESP32-S3"
    connections:
      # Breadboard/rail side → LCD pin
      # Power
      VSS:  rail-minus      # LCD GND
      VDD:  rail-plus       # LCD 3.3 V
      RW:   rail-minus      # write-only mode (tie to GND)
      A:    rail-plus       # backlight anode
      K:    rail-minus      # backlight cathode
      # Contrast (from potentiometer wiper)
      V0:   D34             # D34 is electrically connected to pot wiper at E34
      # GPIO signals
      RS:   B4              # adjacent to ESP32 GPIO4 at A4
      E:    B5              # adjacent to ESP32 GPIO5 at A5
      D4:   B6              # adjacent to ESP32 GPIO6 at A6
      D5:   B7              # adjacent to ESP32 GPIO7 at A7
      D6:   B12             # adjacent to ESP32 GPIO8 at A12 (NOT row 8)
      D7:   B15             # adjacent to ESP32 GPIO9 at A15 (NOT row 9)

wires:
  # ── Power rail setup ────────────────────────────────────────────────────
  # A1/A22/I1 are occupied by ESP32 pins → use adjacent holes.

  - from: B1          # row 1 left-half; A1 occupied by esp32.3V3.1
    to:   rail-plus
    color: red
    purpose: ESP32 3.3V → (+) power rail

  - from: B22         # row 22 left-half; A22 occupied by esp32.GND.1
    to:   rail-minus
    color: black
    purpose: ESP32 GND (left header) → (-) power rail

  - from: J1          # row 1 right-half; I1 occupied by esp32.GND.2
    to:   rail-minus
    color: black
    purpose: ESP32 GND (right header) → (-) power rail

  # ── LDR voltage divider ─────────────────────────────────────────────────
  # H28 = LDR 3V3 end; H29/G29 = junction node; G31 = resistor GND end
  # Column F is free in these rows — use it for the rail/junction wires.

  - from: rail-plus
    to:   F28         # row 28 right-half; H28 occupied by ldr.lead-1
    color: red
    purpose: 3.3V → top of LDR

  - from: F31         # row 31 right-half; G31 occupied by resistor-10k.lead-2
    to:   rail-minus
    color: black
    purpose: Bottom of 10K resistor → GND

  - from: F29         # row 29 right-half; G29 and H29 occupied; F29 is free
    to:   J4          # row 4 right-half; I4 occupied by esp32.GPIO1; J4 is free
    color: yellow
    purpose: LDR junction → ESP32 GPIO1 (ADC input)

  # ── Potentiometer ────────────────────────────────────────────────────────
  # C33/C35 are terminal pins; E34 is the wiper.
  # Use column B (free) for the terminal wires.
  # D34 is electrically connected to wiper at E34 (same row-half, free hole).

  - from: B33         # row 33 left-half; C33 occupied by pot.gnd-end
    to:   rail-minus
    color: black
    purpose: Potentiometer GND terminal → (-) rail

  - from: B35         # row 35 left-half; C35 occupied by pot.vcc-end
    to:   rail-plus
    color: red
    purpose: Potentiometer VCC terminal → (+) rail

  - from: D34         # row 34 left-half; E34 occupied by pot.wiper; D34 is free
    to:   ext:lcd:V0
    color: green
    purpose: Potentiometer wiper → LCD contrast (V0, pin 3)

  # ── LCD power / mode wires (to external LCD) ─────────────────────────────

  - from: rail-minus
    to:   ext:lcd:VSS
    color: black
    purpose: LCD VSS (pin 1) → GND

  - from: rail-plus
    to:   ext:lcd:VDD
    color: red
    purpose: LCD VDD (pin 2) → 3.3V

  - from: rail-minus
    to:   ext:lcd:RW
    color: black
    purpose: LCD RW (pin 5) → GND (write-only mode)

  - from: rail-plus
    to:   ext:lcd:A
    color: red
    purpose: LCD backlight anode (pin 15) → 3.3V

  - from: rail-minus
    to:   ext:lcd:K
    color: black
    purpose: LCD backlight cathode (pin 16) → GND

  # ── GPIO → LCD control and data wires ────────────────────────────────────
  # ESP32 GPIO pins in column A → use column B (free) as wire source.
  # Wire goes from B-column breadboard hole directly to LCD header pin.

  - from: B4          # row 4; A4 = GPIO4
    to:   ext:lcd:RS
    color: blue
    purpose: GPIO4 → LCD RS (pin 4, data/command select)

  - from: B5          # row 5; A5 = GPIO5
    to:   ext:lcd:E
    color: purple
    purpose: GPIO5 → LCD Enable (pin 6)

  - from: B6          # row 6; A6 = GPIO6
    to:   ext:lcd:D4
    color: orange
    purpose: GPIO6 → LCD D4 (pin 11)

  - from: B7          # row 7; A7 = GPIO7
    to:   ext:lcd:D5
    color: yellow
    purpose: GPIO7 → LCD D5 (pin 12)

  - from: B12         # row 12; A12 = GPIO8  (GPIO8 is at row 12, NOT row 8)
    to:   ext:lcd:D6
    color: green
    purpose: GPIO8 → LCD D6 (pin 13)

  - from: B15         # row 15; A15 = GPIO9  (GPIO9 is at row 15, NOT row 9)
    to:   ext:lcd:D7
    color: white
    purpose: GPIO9 → LCD D7 (pin 14)
