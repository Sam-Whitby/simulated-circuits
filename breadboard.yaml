# breadboard.yaml — Physical layout for the ambient light sensor circuit.
# Validated by: python3 breadboard_validator.py breadboard.yaml
#
# Coordinate system
#   Columns A-E = left half of breadboard (isolated from F-J by centre gap)
#   Columns F-J = right half
#   Rows 1-63 top-to-bottom (full-size 830-point breadboard)
#   Power rails: "rail-plus" = (+) / 3.3V   "rail-minus" = (-) / GND
#
# Rule: each hole accepts exactly one component lead or one jumper wire pin.
# Wires that connect to a component node must use a DIFFERENT hole in the
# same row-half, not the hole occupied by the component pin itself.

breadboard:
  type: full-size
  rows: 63
  columns: [A, B, C, D, E, F, G, H, I, J]

components:

  # ── ESP32-S3 DevKitC-1 ──────────────────────────────────────────────────
  # Dimensions from board.json: width=25.527mm, height=70.057mm
  # Left header at x=1.343mm, right header at x=24.19mm (pin-to-pin = 22.847mm ≈ 9 hole-spacings)
  # → left pins in col A, right pins in col I
  # Board top clearance: 7.667mm (≈3 rows) above pin-1 — hangs off the breadboard top edge
  # Board bottom overhang: (70.057-61.007)mm / 2.54mm = 3.56 rows below pin-22
  # → board body bottom = row 22 + 3.56 ≈ row 26
  # CONSEQUENCE: rows 1-26, columns A-J are physically covered by the PCB body.
  # No other component may be placed in that zone.
  - id: esp32
    type: board-esp32-s3-devkitc-1
    body:
      top-row: 1
      bottom-row: 26
      left-col: A
      right-col: J
    pins:
      # Left header — column A, rows 1-22
      3V3.1:  A1
      3V3.2:  A2
      RST:    A3
      "4":    A4    # GPIO4  → LCD RS
      "5":    A5    # GPIO5  → LCD Enable
      "6":    A6    # GPIO6  → LCD D4
      "7":    A7    # GPIO7  → LCD D5
      "15":   A8
      "16":   A9
      "17":   A10
      "18":   A11
      "8":    A12   # GPIO8  → LCD D6  (row 12, NOT row 8)
      "3":    A13
      "46":   A14
      "9":    A15   # GPIO9  → LCD D7  (row 15, NOT row 9)
      "10":   A16
      "11":   A17
      "12":   A18
      "13":   A19
      "14":   A20
      5V:     A21
      GND.1:  A22
      # Right header — column I, rows 1-22
      GND.2:  I1
      TX:     I2
      RX:     I3
      "1":    I4    # GPIO1  → LDR junction (ADC input)
      "2":    I5
      "42":   I6
      "41":   I7
      "40":   I8
      "39":   I9
      "38":   I10
      "37":   I11
      "36":   I12
      "35":   I13
      "0":    I14
      "45":   I15
      "48":   I16
      "47":   I17
      "21":   I18
      "20":   I19
      "19":   I20
      GND.3:  I21
      GND.4:  I22

  # ── Photoresistor (LDR) ─────────────────────────────────────────────────
  # Rows 28-29, column H (right half). Clear of ESP32 body (ends at row 26).
  # lead-1 = 3.3V end (H28)
  # lead-2 = junction with resistor (H29) — shared node, different holes
  - id: ldr
    type: photoresistor-ldr
    body:
      top-row: 28
      bottom-row: 29
      left-col: H
      right-col: H
    pins:
      lead-1: H28   # 3.3V end
      lead-2: H29   # junction (electrically shared with resistor-10k.lead-1 at G29)

  # ── 10K pull-down resistor ──────────────────────────────────────────────
  # Rows 29-31, column G (right half, adjacent to LDR column H).
  # lead-1 shares the junction node with ldr.lead-2 (same row 29, right half).
  # lead-2 = GND end (G31).
  - id: resistor-10k
    type: resistor
    body:
      top-row: 29
      bottom-row: 31
      left-col: G
      right-col: G
    pins:
      lead-1: G29   # junction (same row-half as H29 → electrically connected)
      lead-2: G31   # GND end

  # ── Potentiometer (10K, LCD contrast) ───────────────────────────────────
  # Rows 33-35, column C (left half).
  # Pin order: gnd-end (C33), wiper (C34), vcc-end (C35)
  - id: pot
    type: potentiometer-10k
    body:
      top-row: 33
      bottom-row: 35
      left-col: C
      right-col: C
    pins:
      gnd-end: C33
      wiper:   C34
      vcc-end: C35

  # ── LCD1602 (16-pin parallel) ────────────────────────────────────────────
  # 16 pins in column E, rows 38-53.  Pin 1 (VSS) at E38, pin 16 (K) at E53.
  # 4-bit mode: D0-D3 (E44-E47) left unconnected.
  - id: lcd
    type: lcd1602-16pin
    body:
      top-row: 38
      bottom-row: 53
      left-col: E
      right-col: E
    pins:
      VSS: E38   # pin  1  GND
      VDD: E39   # pin  2  3.3V
      V0:  E40   # pin  3  contrast (potentiometer wiper)
      RS:  E41   # pin  4  GPIO4
      RW:  E42   # pin  5  GND (write-only)
      E:   E43   # pin  6  GPIO5 (Enable)
      D0:  E44   # pin  7  unused in 4-bit mode
      D1:  E45   # pin  8  unused
      D2:  E46   # pin  9  unused
      D3:  E47   # pin 10  unused
      D4:  E48   # pin 11  GPIO6
      D5:  E49   # pin 12  GPIO7
      D6:  E50   # pin 13  GPIO8
      D7:  E51   # pin 14  GPIO9
      A:   E52   # pin 15  backlight anode  (+)
      K:   E53   # pin 16  backlight cathode (-)

wires:
  # ── Power rail setup ────────────────────────────────────────────────────
  # A1/A22/I1 are occupied by ESP32 pins → use adjacent holes in the same row.

  - from: B1          # row 1 left-half; A1 is occupied by esp32.3V3.1
    to:   rail-plus
    color: red
    purpose: ESP32 3.3V → (+) power rail

  - from: B22         # row 22 left-half; A22 is occupied by esp32.GND.1
    to:   rail-minus
    color: black
    purpose: ESP32 GND (left header) → (-) power rail

  - from: J1          # row 1 right-half; I1 is occupied by esp32.GND.2
    to:   rail-minus
    color: black
    purpose: ESP32 GND (right header) → (-) power rail

  # ── LDR voltage divider ─────────────────────────────────────────────────
  # H28 = LDR 3V3 end; H29/G29 = junction; G31 = resistor GND end
  # Use column F (free) for the two rail connections; row 29 column F for ADC wire.

  - from: rail-plus
    to:   F28         # row 28 right-half; H28 is occupied by ldr.lead-1
    color: red
    purpose: 3.3V → top of LDR

  - from: F31         # row 31 right-half; G31 is occupied by resistor-10k.lead-2
    to:   rail-minus
    color: black
    purpose: Bottom of 10K resistor → GND

  - from: F29         # row 29 right-half; G29 and H29 occupied; F29 is free
    to:   J4          # row 4 right-half; I4 is occupied by esp32.GPIO1; J4 is free
    color: yellow
    purpose: LDR junction → ESP32 GPIO1 (ADC input)

  # ── Potentiometer ────────────────────────────────────────────────────────
  # C33/C34/C35 occupied by pot pins → use column B (free) for wires.

  - from: B33         # row 33 left-half; C33 occupied by pot.gnd-end
    to:   rail-minus
    color: black
    purpose: Potentiometer GND end → (-) rail

  - from: B35         # row 35 left-half; C35 occupied by pot.vcc-end
    to:   rail-plus
    color: red
    purpose: Potentiometer VCC end → (+) rail

  - from: B34         # row 34 left-half; C34 occupied by pot.wiper
    to:   D40         # row 40 left-half; E40 occupied by lcd.V0
    color: green
    purpose: Potentiometer wiper → LCD contrast (V0, pin 3)

  # ── LCD power and mode wires ─────────────────────────────────────────────
  # LCD pins in column E → use column D (free, same row) for wire endpoints.

  - from: D38         # row 38; E38 occupied by lcd.VSS
    to:   rail-minus
    color: black
    purpose: LCD VSS (pin 1) → GND

  - from: D39         # row 39; E39 occupied by lcd.VDD
    to:   rail-plus
    color: red
    purpose: LCD VDD (pin 2) → 3.3V

  - from: D42         # row 42; E42 occupied by lcd.RW
    to:   rail-minus
    color: black
    purpose: LCD RW (pin 5) → GND (write-only mode)

  - from: D52         # row 52; E52 occupied by lcd.A (backlight+)
    to:   rail-plus
    color: red
    purpose: LCD backlight anode (pin 15) → 3.3V

  - from: D53         # row 53; E53 occupied by lcd.K (backlight-)
    to:   rail-minus
    color: black
    purpose: LCD backlight cathode (pin 16) → GND

  # ── GPIO → LCD control and data wires ────────────────────────────────────
  # ESP32 GPIO pins in column A → use column B (free) as wire source.
  # LCD pins in column E → use column D (free) as wire destination.

  - from: B4          # row 4 left-half; A4 occupied by esp32.GPIO4
    to:   D41         # row 41 left-half; E41 occupied by lcd.RS
    color: blue
    purpose: GPIO4 → LCD RS (pin 4, data/command select)

  - from: B5          # row 5; A5 = GPIO5
    to:   D43         # row 43; E43 = lcd.E (Enable)
    color: purple
    purpose: GPIO5 → LCD Enable (pin 6)

  - from: B6          # row 6; A6 = GPIO6
    to:   D48         # row 48; E48 = lcd.D4
    color: orange
    purpose: GPIO6 → LCD D4 (pin 11)

  - from: B7          # row 7; A7 = GPIO7
    to:   D49         # row 49; E49 = lcd.D5
    color: yellow
    purpose: GPIO7 → LCD D5 (pin 12)

  - from: B12         # row 12; A12 = GPIO8  (note: NOT row 8)
    to:   D50         # row 50; E50 = lcd.D6
    color: green
    purpose: GPIO8 → LCD D6 (pin 13)

  - from: B15         # row 15; A15 = GPIO9  (note: GPIO9 is at row 15, not row 9)
    to:   D51         # row 51; E51 = lcd.D7
    color: white
    purpose: GPIO9 → LCD D7 (pin 14)
